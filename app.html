<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
<title>The Reading Room</title>

<!-- PWA: theme + iOS app behavior -->
<meta name="theme-color" content="#1e3a5f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reading Room">
<meta name="description" content="Your personal library — track books, quotes, habits, and more.">

<!-- PWA manifest -->
<link rel="manifest" href="/manifest.webmanifest">

<!-- iOS home screen icon -->
<link rel="apple-touch-icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180"><rect width="180" height="180" rx="38" fill="%231e3a5f"/><text x="90" y="123" font-size="105" text-anchor="middle" font-family="Georgia" fill="white">%E2%9D%A6</text></svg>'>

<link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="%231e3a5f"/><text x="32" y="44" font-size="38" text-anchor="middle" font-family="Georgia" fill="white">%E2%9D%A6</text></svg>'>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     THEME PALETTES
     The default is the classic navy. Each [data-theme] swaps the
     same nine-step ramp to a softer, muted-pastel hue. Text tones
     (--navy / --navy-deep / --ink) stay dark enough to read; the
     pastel character comes through backgrounds, borders & accents.
     ============================================================ */
  :root {
    /* Navy (default) */
    --navy:      #1e3a5f;
    --navy-deep: #0f2240;
    --steel:     #4a76a8;
    --sky:       #8eb0d4;
    --mist:      #c4d8ec;
    --haze:      #dbe7f3;
    --pale:      #eaf2fa;
    --cloud:     #f3f7fc;
    --ink:       #2c4a6e;
    --navy-rgb:  30, 58, 95;
    --steel-rgb: 74, 118, 168;
  }
  [data-theme="sage"] {
    --navy:      #2f4339;
    --navy-deep: #1f2e27;
    --steel:     #588069;
    --sky:       #9cbfaf;
    --mist:      #cfe0d6;
    --haze:      #dfeae3;
    --pale:      #ecf3ee;
    --cloud:     #f4f8f5;
    --ink:       #3a5046;
    --navy-rgb:  47, 67, 57;
    --steel-rgb: 88, 128, 105;
  }
  [data-theme="rose"] {
    --navy:      #5a3a44;
    --navy-deep: #3e2730;
    --steel:     #9c6571;
    --sky:       #cda7af;
    --mist:      #e6d2d7;
    --haze:      #efe1e4;
    --pale:      #f6edef;
    --cloud:     #faf5f6;
    --ink:       #6a4751;
    --navy-rgb:  90, 58, 68;
    --steel-rgb: 156, 101, 113;
  }
  [data-theme="lavender"] {
    --navy:      #463a5e;
    --navy-deep: #2e2640;
    --steel:     #756799;
    --sky:       #b0a4cd;
    --mist:      #d8d0e6;
    --haze:      #e6e0ef;
    --pale:      #f0ecf6;
    --cloud:     #f7f5fa;
    --ink:       #514568;
    --navy-rgb:  70, 58, 94;
    --steel-rgb: 117, 103, 153;
  }
  [data-theme="clay"] {
    --navy:      #5e4035;
    --navy-deep: #3f2a22;
    --steel:     #9f7059;
    --sky:       #ceae9c;
    --mist:      #e6d8cf;
    --haze:      #efe5dd;
    --pale:      #f6efea;
    --cloud:     #faf6f3;
    --ink:       #6d4d40;
    --navy-rgb:  94, 64, 53;
    --steel-rgb: 159, 112, 89;
  }
  [data-theme="honey"] {
    --navy:      #5a4a2a;
    --navy-deep: #3c3019;
    --steel:     #927840;
    --sky:       #cdb985;
    --mist:      #e6dcc4;
    --haze:      #efe8d8;
    --pale:      #f6f1e6;
    --cloud:     #faf7f0;
    --ink:       #66552f;
    --navy-rgb:  90, 74, 42;
    --steel-rgb: 146, 120, 64;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body {
    font-family: 'EB Garamond', Georgia, serif;
    color: var(--navy);
    background: linear-gradient(180deg, #ffffff 0%, var(--pale) 100%);
    min-height: 100vh;
    /* iOS safe area support */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: var(--haze); }
  ::-webkit-scrollbar-thumb { background: var(--sky); border-radius: 5px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--steel); }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--steel) !important;
    box-shadow: 0 0 0 3px rgba(var(--steel-rgb), 0.15);
  }
  /* Prevent iOS zoom on input focus */
  input, select, textarea { font-size: 16px; }
  button { font-family: inherit; cursor: pointer; -webkit-appearance: none; }
  
  /* Header */
  header {
    background: linear-gradient(180deg, #ffffff 0%, var(--cloud) 100%);
    border-bottom: 1px solid var(--mist);
    padding: 2rem 0 1.5rem;
  }
  .header-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 1rem;
  }
  .logo { display: flex; align-items: center; gap: 1rem; }
  .logo-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--steel), var(--navy));
    color: #ffffff;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(var(--navy-rgb), 0.3);
    font-size: 1.5rem;
    flex-shrink: 0;
  }
  .logo-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .logo-subtitle {
    font-size: 0.75rem; color: var(--steel);
    margin-top: 0.1rem;
    letter-spacing: 0.15em; text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .header-stats { display: flex; gap: 1rem; }
  .stat-bubble {
    background: #ffffff;
    border: 1px solid var(--mist);
    border-radius: 999px;
    padding: 0.5rem 1.25rem;
    display: flex; flex-direction: column; align-items: center;
    min-width: 70px;
  }
  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 700;
    color: var(--navy); line-height: 1;
  }
  .stat-lbl {
    font-size: 0.65rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--steel);
    font-family: 'Inter', sans-serif;
  }
  
  /* Nav */
  nav {
    background: var(--pale);
    border-bottom: 1px solid var(--mist);
    position: sticky; top: 0; z-index: 10;
  }
  .nav-inner {
    max-width: 1280px; margin: 0 auto;
    padding: 0 1rem;
    display: flex; overflow-x: auto;
    gap: 0.25rem;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .nav-inner::-webkit-scrollbar { display: none; }
  .nav-btn {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.85rem 1.1rem;
    background: transparent; border: none;
    border-bottom: 2px solid transparent;
    color: var(--steel);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; font-weight: 500;
    white-space: nowrap;
    transition: all 0.2s;
    min-height: 44px;
  }
  .nav-btn:hover { background: var(--haze); }
  .nav-btn.active {
    color: var(--navy);
    border-bottom-color: var(--steel);
    background: #ffffff;
    font-weight: 600;
  }
  
  /* iOS install banner */
  .install-banner {
    display: none;
    background: linear-gradient(135deg, var(--steel), var(--navy));
    color: #ffffff;
    padding: 0.75rem 1rem;
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    text-align: center;
    position: relative;
  }
  .install-banner.show { display: block; }
  .install-banner-close {
    position: absolute;
    right: 0.5rem; top: 50%;
    transform: translateY(-50%);
    background: transparent;
    border: none;
    color: #ffffff;
    font-size: 1.2rem;
    width: 32px; height: 32px;
    border-radius: 50%;
  }
  
  /* Main */
  main {
    max-width: 1280px;
    margin: 0 auto;
    padding: 2.5rem 2rem;
    min-height: calc(100vh - 280px);
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }
  
  /* Section header */
  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 2px solid var(--mist);
    flex-wrap: wrap;
    gap: 1rem;
  }
  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem; font-weight: 600;
    letter-spacing: -0.01em;
  }
  .section-subtitle {
    color: var(--steel);
    margin-top: 0.25rem;
    font-size: 1rem; font-style: italic;
  }
  .sub-heading {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 600;
    margin: 1.5rem 0 1rem;
  }
  
  /* Buttons */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 0.4rem;
    padding: 0.7rem 1.25rem;
    background: linear-gradient(135deg, var(--steel), var(--navy));
    color: #ffffff; border: none;
    border-radius: 4px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; font-weight: 600;
    letter-spacing: 0.02em;
    box-shadow: 0 2px 6px rgba(var(--navy-rgb), 0.25);
    transition: transform 0.2s;
    min-height: 44px;
  }
  .btn-primary:active { transform: translateY(1px); }
  .btn-secondary {
    padding: 0.7rem 1.25rem;
    background: transparent;
    color: var(--steel);
    border: 1px solid var(--mist);
    border-radius: 4px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; font-weight: 500;
    min-height: 44px;
  }
  .btn-small {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.5rem 0.9rem;
    background: var(--haze);
    color: var(--navy);
    border: 1px solid var(--mist);
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 0.75rem; font-weight: 500;
    min-height: 36px;
  }
  .icon-btn {
    width: 36px; height: 36px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 4px;
    color: var(--steel);
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-size: 1rem;
  }
  .icon-btn:active { background: var(--pale); border-color: var(--mist); }
  
  /* Form */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .field { display: flex; flex-direction: column; gap: 0.4rem; }
  .field.full { grid-column: 1 / -1; }
  .field-label {
    font-size: 0.7rem; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--steel);
    font-family: 'Inter', sans-serif; font-weight: 500;
  }
  .input {
    padding: 0.75rem 0.85rem;
    background: #ffffff;
    border: 1px solid var(--mist);
    border-radius: 6px;
    font-family: 'EB Garamond', serif;
    font-size: 16px;
    color: var(--navy);
    transition: all 0.2s;
    width: 100%;
    -webkit-appearance: none;
  }
  textarea.input { min-height: 80px; resize: vertical; }
  
  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(var(--navy-rgb), 0.5);
    display: none;
    align-items: center; justify-content: center;
    z-index: 100;
    padding: 1rem;
    animation: fadeIn 0.2s ease;
    backdrop-filter: blur(2px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #ffffff;
    border: 1px solid var(--mist);
    border-radius: 12px;
    width: 100%; max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(var(--navy-rgb), 0.4);
    animation: scaleIn 0.25s ease;
  }
  .modal-header {
    padding: 1.25rem 1.5rem;
    background: linear-gradient(135deg, var(--cloud), var(--pale));
    border-bottom: 1px solid var(--mist);
    display: flex; justify-content: space-between; align-items: center;
    border-radius: 12px 12px 0 0;
  }
  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.5rem; font-weight: 600;
  }
  .modal-body { padding: 1.5rem; }
  .modal-actions {
    display: flex; gap: 0.75rem; justify-content: flex-end;
    flex-wrap: wrap;
  }
  
  /* Empty state */
  .empty {
    text-align: center;
    padding: 3rem 1.5rem;
    background: var(--cloud);
    border: 1px dashed var(--mist);
    border-radius: 8px;
  }
  .empty-icon {
    color: var(--sky);
    margin-bottom: 1rem;
    font-size: 3rem;
  }
  .empty-msg {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem; font-style: italic;
    color: var(--steel);
    margin-bottom: 1.5rem;
  }
  
  /* Status badges */
  .badge {
    display: inline-block;
    padding: 0.2rem 0.65rem;
    border-radius: 999px;
    font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-family: 'Inter', sans-serif;
  }
  .badge.reading { background: var(--haze); color: var(--navy); }
  .badge.read { background: var(--mist); color: var(--navy); }
  .badge.tbr { background: var(--pale); color: var(--steel); }
  .badge.dnf { background: var(--haze); color: var(--steel); }
  
  /* Toolbar */
  .toolbar {
    display: flex; gap: 1rem; margin-bottom: 2rem;
    flex-wrap: wrap; align-items: center;
  }
  .search-wrap {
    display: flex; align-items: center; gap: 0.5rem;
    background: #ffffff;
    border: 1px solid var(--mist);
    border-radius: 6px;
    padding: 0.5rem 0.85rem;
    flex: 1; min-width: 100%; max-width: 400px;
  }
  .search-input {
    border: none; background: transparent; outline: none;
    flex: 1;
    font-size: 16px;
    font-family: 'EB Garamond', serif;
    color: var(--navy);
  }
  .filter-chips { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .chip {
    padding: 0.5rem 1rem;
    background: transparent;
    border: 1px solid var(--mist);
    border-radius: 999px;
    color: var(--steel);
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    transition: all 0.2s;
    min-height: 36px;
  }
  .chip.active {
    background: var(--steel);
    color: #ffffff;
    border-color: var(--steel);
  }
  
  /* Book covers */
  .book-cover {
    border-radius: 2px;
    box-shadow: 0 4px 12px rgba(var(--navy-rgb), 0.25), inset -2px 0 4px rgba(0,0,0,0.15), inset 2px 0 2px rgba(255,255,255,0.1);
    display: flex; flex-direction: column; justify-content: space-between;
    color: #ffffff;
    font-family: 'Cormorant Garamond', serif;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .book-cover::before {
    content: '';
    position: absolute;
    left: 4px; top: 8px; bottom: 8px;
    width: 1px;
    background: rgba(255, 255, 255, 0.3);
  }
  .book-cover.small { width: 50px; height: 75px; padding: 6px 4px; }
  .book-cover.medium { width: 90px; height: 135px; padding: 10px 8px; }
  .book-cover.large { width: 140px; height: 210px; padding: 14px 12px; }
  .book-cover-title {
    font-weight: 600; line-height: 1.2;
    text-align: center; letter-spacing: 0.02em;
  }
  .book-cover.small .book-cover-title { font-size: 0.55rem; }
  .book-cover.medium .book-cover-title { font-size: 0.75rem; }
  .book-cover.large .book-cover-title { font-size: 0.95rem; }
  .book-cover-bottom { text-align: center; }
  .book-cover-deco { opacity: 0.8; }
  .book-cover.small .book-cover-deco { font-size: 0.7rem; }
  .book-cover.medium .book-cover-deco { font-size: 0.7rem; }
  .book-cover.large .book-cover-deco { font-size: 1.2rem; }
  .book-cover-author {
    font-style: italic;
    opacity: 0.85;
    letter-spacing: 0.05em;
  }
  .book-cover.small .book-cover-author { font-size: 0.45rem; }
  .book-cover.medium .book-cover-author { font-size: 0.55rem; }
  .book-cover.large .book-cover-author { font-size: 0.7rem; }
  
  /* Real cover image */
  .book-cover.has-image {
    padding: 0 !important;
  }
  .book-cover.has-image::before {
    display: none;
  }
  .book-cover-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  
  /* ISBN Lookup */
  .isbn-lookup {
    background: linear-gradient(135deg, var(--cloud), var(--pale));
    border: 1px solid var(--mist);
    border-radius: 8px;
    padding: 1rem 1.1rem;
    margin-bottom: 1.25rem;
  }
  .isbn-row {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }
  .isbn-row .input {
    flex: 1;
    min-width: 180px;
  }
  .isbn-row .btn-primary {
    white-space: nowrap;
  }
  .isbn-hint {
    font-size: 0.8rem;
    color: var(--steel);
    margin-top: 0.5rem;
    font-family: 'Inter', sans-serif;
    font-style: italic;
  }
  .isbn-hint.error { color: #b85450; font-style: normal; }
  .isbn-hint.success { color: #2d7a5f; font-style: normal; }
  .isbn-hint.loading { color: var(--steel); font-style: normal; }
  .cover-preview-row {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    padding: 0.5rem 0;
  }
  .cover-preview-row .book-cover {
    width: 80px;
    height: 120px;
    flex-shrink: 0;
  }
  
  /* Progress bars */
  .progress-bar {
    height: 6px;
    background: var(--haze);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--navy), var(--steel));
    transition: width 0.4s;
  }
  .progress-text {
    font-size: 0.75rem;
    color: var(--steel);
    margin-top: 0.4rem;
    font-family: 'Inter', sans-serif;
  }
  
  /* Dashboard */
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.25rem;
  }
  .dashboard-hero {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, var(--cloud), var(--pale));
    border: 1px solid var(--mist);
    border-radius: 8px;
    padding: 2.5rem 3rem;
    position: relative;
    overflow: hidden;
  }
  .hero-decor {
    position: absolute;
    top: 1rem; right: 2rem;
    font-size: 6rem; color: var(--mist);
    line-height: 1;
  }
  .hero-eyebrow {
    font-size: 0.75rem; letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--steel);
    font-family: 'Inter', sans-serif;
    display: inline-flex; align-items: center; gap: 0.5rem;
  }
  .name-edit-btn {
    background: transparent;
    border: 1px solid var(--mist);
    color: var(--steel);
    width: 22px; height: 22px;
    border-radius: 50%;
    font-size: 0.7rem;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    padding: 0;
  }
  .name-edit-btn:active {
    background: var(--steel);
    color: #ffffff;
    border-color: var(--steel);
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.5rem; font-weight: 500;
    margin: 0.25rem 0 0.5rem;
    letter-spacing: -0.01em;
  }
  .hero-date {
    color: var(--steel);
    font-style: italic;
    font-size: 1.05rem;
  }
  .stat-card {
    background: #ffffff;
    border: 1px solid var(--mist);
    border-radius: 8px;
    padding: 1.5rem 1.25rem;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:active {
    transform: translateY(-2px);

  /* Habits */

    background: #ffffff;
    border: 1px solid var(--mist);

  /* Challenge */

  /* Book Club */

  /* ============== MOBILE STYLES ============== */

    /* Stat cards: 2 columns */

    /* Modal goes full-width on mobile */

<body>

<div class="install-banner" id="install-banner">
  📱 Install: tap Share <span style="font-size:1.1em;">⎘</span> then "Add to Home Screen"
  <button class="install-banner-close" onclick="dismissInstallBanner()">×</button>
</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">📖</div>
      <div>
        <h1 class="logo-title">The Reading Room</h1>
        <p class="logo-subtitle">Personal Library</p>
      </div>
    </div>
    <div class="header-stats" id="header-stats"></div>
  </div>
</header>

<nav>
  <div class="nav-inner" id="nav-tabs"></div>
</nav>

<main id="main"></main>

<footer>
  <p>"A reader lives a thousand lives before he dies. The man who never reads lives only one." — George R.R. Martin</p>
</footer>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
// ============== STATE & STORAGE ==============
const state = {
  books: [],
  series: [],
  wishlist: [],
  quotes: [],
  habits: [],
  challenge: { goal: 24, year: new Date().getFullYear() },
  bookClubs: [],
  readerName: '',
  activeTab: 'dashboard',
  filter: 'all',
  search: '',
  calendarDate: new Date(),
  modal: null,
  clubTabs: {},
};

const STORAGE_KEY = 'reading-room-data';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      Object.assign(state, parsed);
      state.calendarDate = new Date();
    }
  } catch (e) { console.error('Load error:', e); }
}

function saveState() {
  try {
    const toSave = {
      books: state.books,
      series: state.series,
      wishlist: state.wishlist,
      quotes: state.quotes,
      habits: state.habits,
      challenge: state.challenge,
      bookClubs: state.bookClubs,
      readerName: state.readerName,
    };
    localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
  } catch (e) { console.error('Save error:', e); }
}

// ============== THEME / APPEARANCE ==============
// Each theme remaps the same palette ramp to a softer hue. The default
// is the classic navy. `bar` is the browser/status-bar color; `dots`
// are the three swatch colors shown in the picker (deep, mid, tint).
const THEMES = [
  { id: 'navy',     label: 'Navy',     bar: '#1e3a5f', dots: ['#1e3a5f', '#4a76a8', '#c4d8ec'] },
  { id: 'sage',     label: 'Sage',     bar: '#2f4339', dots: ['#2f4339', '#588069', '#cfe0d6'] },
  { id: 'rose',     label: 'Rose',     bar: '#5a3a44', dots: ['#5a3a44', '#9c6571', '#e6d2d7'] },
  { id: 'lavender', label: 'Lavender', bar: '#463a5e', dots: ['#463a5e', '#756799', '#d8d0e6'] },
  { id: 'clay',     label: 'Clay',     bar: '#5e4035', dots: ['#5e4035', '#9f7059', '#e6d8cf'] },
  { id: 'honey',    label: 'Honey',    bar: '#5a4a2a', dots: ['#5a4a2a', '#927840', '#e6dcc4'] },
];
const THEME_KEY = 'reading-room-theme';

function getTheme() {
  try { return localStorage.getItem(THEME_KEY) || 'navy'; }
  catch (e) { return 'navy'; }
}

function applyTheme(id) {
  const t = THEMES.find(x => x.id === id) || THEMES[0];
  if (t.id === 'navy') document.documentElement.removeAttribute('data-theme');
  else document.documentElement.setAttribute('data-theme', t.id);
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.setAttribute('content', t.bar);
  try { localStorage.setItem(THEME_KEY, t.id); } catch (e) {}
}

function setTheme(id) {
  applyTheme(id);
  renderMain(); // refresh the picker's active state if the dashboard is open
}

function renderThemePicker() {
  const current = getTheme();
  return `
    <div class="dash-card">
      <h3 class="dash-card-title">Appearance</h3>
      <p style="font-family:'Inter',sans-serif;font-size:0.8rem;color:var(--steel);margin:-0.25rem 0 0.9rem;">Choose a color palette for your library. Your choice is saved on this device.</p>
      <div class="theme-row">
        ${THEMES.map(t => `
          <div class="theme-swatch ${t.id === current ? 'active' : ''}" role="button" tabindex="0"
               onclick="setTheme('${t.id}')"
               onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();setTheme('${t.id}')}"
               aria-pressed="${t.id === current}" aria-label="${t.label} theme">
            <div class="swatch-dots">${t.dots.map(c => `<i style="background:${c}"></i>`).join('')}</div>
            <span class="swatch-label">${t.label}</span>
          </div>
        `).join('')}
      </div>
    </div>`;
}

// ============== UTILITIES ==============
function escapeHtml(str) {
  if (str == null) return '';
  return String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function uid() { return Date.now().toString() + Math.random().toString(36).slice(2, 7); }

function todayStr() { return new Date().toISOString().split('T')[0]; }

const TABS = [
  { id: 'dashboard', label: 'Home', icon: '🏠' },
  { id: 'books', label: 'Books', icon: '📖' },
  { id: 'series', label: 'Series', icon: '🔖' },
  { id: 'gallery', label: 'Gallery', icon: '🖼️' },
  { id: 'library', label: 'Library', icon: '📚' },
  { id: 'wishlist', label: 'Wishlist', icon: '♥' },
  { id: 'quotes', label: 'Quotes', icon: '❝' },
  { id: 'habits', label: 'Habits', icon: '◎' },
  { id: 'challenge', label: 'Goal', icon: '🏆' },
  { id: 'calendar', label: 'Calendar', icon: '📅' },
  { id: 'club', label: 'Club', icon: '👥' },
  { id: 'help', label: 'Guide', icon: '❓' },
];

const PALETTE = ['#4a76a8', '#8eb0d4', '#1e3a5f', '#6a90b8', '#aac4dc', '#5a8ab8', '#2c5582', '#7ea4c8'];

function colorForBook(book) {
  const idx = (book.title?.charCodeAt(0) || 0) % PALETTE.length;
  return PALETTE[idx];
}

function bookCoverHtml(book, size = 'medium') {
  const color = colorForBook(book);
  // If we have a real cover URL, render it as an img with fallback to stylized cover
  if (book.coverUrl) {
    const fallbackHtml = `
      <p class=&quot;book-cover-title&quot;>${escapeHtml(book.title)}</p>
      <div class=&quot;book-cover-bottom&quot;>
        <div class=&quot;book-cover-deco&quot;>❦</div>
        <p class=&quot;book-cover-author&quot;>${escapeHtml(book.author)}</p>
      </div>
    `;
    return `
      <div class="book-cover ${size} has-image" style="background: linear-gradient(135deg, ${color}, ${color}dd);">
        <img src="${escapeHtml(book.coverUrl)}" alt="${escapeHtml(book.title)}" class="book-cover-img" onerror="this.style.display='none';this.parentElement.classList.remove('has-image');this.parentElement.innerHTML='${fallbackHtml.replace(/\n\s*/g, '').replace(/'/g, "\\'")}';" />
      </div>
    `;
  }
  // No cover URL → stylized cover
  return `
    <div class="book-cover ${size}" style="background: linear-gradient(135deg, ${color}, ${color}dd);">
      <p class="book-cover-title">${escapeHtml(book.title)}</p>
      <div class="book-cover-bottom">
        <div class="book-cover-deco">❦</div>
        <p class="book-cover-author">${escapeHtml(book.author)}</p>
      </div>
    </div>
  `;
}

function statusBadge(status, small) {
  const labels = { reading: 'Reading', read: 'Read', tbr: 'To Be Read', dnf: 'Did Not Finish' };
  const cls = ['reading','read','tbr','dnf'].includes(status) ? status : 'tbr';
  return `<span class="badge ${cls}" ${small ? 'style="font-size:0.65rem;"' : ''}>${labels[cls]}</span>`;
}

function starsHtml(rating, interactive = false, callback = '') {
  let html = '<div class="stars">';
  for (let i = 1; i <= 5; i++) {
    const filled = i <= (rating || 0);
    html += `<span class="star ${filled ? 'filled' : ''}" ${interactive ? `onclick="${callback}(${i})" style="cursor:pointer;font-size:1.5rem;padding:0.25rem;"` : ''}>★</span>`;
  }
  html += '</div>';
  return html;
}

function progressBarHtml(current, total) {
  const pct = total ? Math.min(Math.round((current / total) * 100), 100) : 0;
  return `

// ============== HABITS ==============
function calcStreak(habit) {
  const dates = habit.completedDates || [];
  let streak = 0;
  let d = new Date();
  while (true) {
    const ds = d.toISOString().split('T')[0];
    if (dates.includes(ds)) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function renderHabits() {
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    last7.push(d.toISOString().split('T')[0]);
  }

  return `
    <div class="section-header">
      <div>
        <h2 class="section-title">Reading Habits</h2>
        <p class="section-subtitle">Small, consistent rituals</p>
      </div>
      <button class="btn-primary" onclick="openModal('habit')">+ Add Habit</button>
    </div>
    ${state.habits.length === 0 ? `
      <div class="empty">
        <div class="empty-icon">◎</div>
        <p class="empty-msg">No habits yet. Try 'Read 30 minutes.'</p>
        <button class="btn-primary" onclick="openModal('habit')">+ Add habit</button>
      </div>
    ` : `
      <div class="habit-list">
        ${state.habits.map(h => {
          const streak = calcStreak(h);
          return `
            <div class="habit-card">
              <div class="habit-header">
                <div style="flex:1;">
                  <h3 class="habit-name">${escapeHtml(h.name)}</h3>
                  ${h.description ? `<p class="habit-desc">${escapeHtml(h.description)}</p>` : ''}
                  <div class="habit-streak">
                    <span style="color:#d4a017;">✦</span>
                    <span>${streak} day streak</span>
                  </div>
                </div>
                <div class="book-actions">
                  <button class="icon-btn" onclick="openModal('habit','${h.id}')">✎</button>
                  <button class="icon-btn" onclick="deleteHabit('${h.id}')">🗑</button>
                </div>
              </div>
              <div class="habit-week">
                ${last7.map(d => {
                  const done = h.completedDates?.includes(d);
                  const date = new Date(d + 'T00:00:00');
                  return `
                    <button class="habit-day ${done ? 'done' : ''}" onclick="toggleHabit('${h.id}','${d}')">
                      <span class="habit-day-label">${date.toLocaleDateString('en', { weekday: 'short' })[0]}</span>
                      <span class="habit-day-num">${date.getDate()}</span>
                      ${done ? '<span class="habit-day-check">✓</span>' : ''}
                    </button>
                  `;
                }).join('')}
              </div>
            </div>
          `;
        }).join('')}
      </div>
    `}
  `;
}

function toggleHabit(habitId, date) {
  state.habits = state.habits.map(h => {
    if (h.id !== habitId) return h;
    const dates = h.completedDates || [];
    const newDates = dates.includes(date) ? dates.filter(d => d !== date) : [...dates, date];
    return { ...h, completedDates: newDates };
  });
  saveState();
  renderAll();
}

function deleteHabit(id) {
  if (!confirm('Delete this habit?')) return;
  state.habits = state.habits.filter(h => h.id !== id);
  saveState();
  renderAll();
}

function saveHabit(data) {
  if (data.id) {
    state.habits = state.habits.map(h => h.id === data.id ? { ...h, ...data } : h);
  } else {
    state.habits.push({ ...data, id: uid(), completedDates: [] });
  }
  saveState();
  closeModal();
  renderAll();
}

// ============== CHALLENGE ==============
function renderChallenge() {
  const year = state.challenge.year || new Date().getFullYear();
  const yearBooks = state.books.filter(b => b.status === 'read' && b.dateFinished && new Date(b.dateFinished).getFullYear() === year);
  const progress = state.challenge.goal > 0 ? (yearBooks.length / state.challenge.goal) * 100 : 0;
  const monthsRead = Array(12).fill(0);
  yearBooks.forEach(b => {
    const m = new Date(b.dateFinished).getMonth();
    monthsRead[m]++;
  });
  const maxMonth = Math.max(...monthsRead, 1);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dayOfYear = Math.floor((new Date() - new Date(year, 0, 0)) / 86400000);
  const yearProgress = (dayOfYear / 365) * 100;
  const onPace = state.challenge.goal * (dayOfYear / 365);
  const ahead = yearBooks.length - onPace;

  return `
    <div class="section-header">
      <div>
        <h2 class="section-title">Reading Challenge</h2>
        <p class="section-subtitle">Your ${year} goal</p>
      </div>
    </div>
    <div class="challenge-card">
      <div class="challenge-header">
        <div>
          <p class="challenge-year">${year}</p>
          <h3 class="challenge-main">${yearBooks.length} <span class="challenge-main-sub">/ ${state.challenge.goal}</span></h3>
          <p class="challenge-sub">${Math.round(progress)}% of goal</p>
        </div>
        <div class="field" style="max-width:140px;">
          <label class="field-label">Annual goal</label>
          <input type="number" class="input" style="font-size:1.5rem;font-family:'Cormorant Garamond',serif;font-weight:600;text-align:center;" value="${state.challenge.goal}" onchange="setChallenge(this.value)">
        </div>
      </div>
      <div class="big-progress">
        <div class="big-progress-fill" style="width:${Math.min(progress,100)}%"></div>
        <div class="pace-marker" style="left:${Math.min(yearProgress,100)}%" title="Today"></div>
      </div>
      <p class="pace-text">
        ${ahead >= 0 ? `<span class="pace-ahead">✓ ${Math.round(ahead*10)/10} books ahead of pace</span>` : `<span class="pace-behind">${Math.round(Math.abs(ahead)*10)/10} books behind pace</span>`}
        ·
        ${state.challenge.goal - yearBooks.length > 0 ? `${state.challenge.goal - yearBooks.length} to go` : 'Goal achieved! 🎉'}
      </p>
    </div>
    <div class="challenge-chart">
      <h3 class="sub-heading">Books Finished by Month</h3>
      <div class="month-bars">
        ${monthsRead.map((count, i) => `
          <div class="month-bar-wrap">
            <div class="month-bar-value">${count || ''}</div>
            <div class="month-bar-track">
              <div class="month-bar" style="height:${(count/maxMonth)*100}%"></div>
            </div>
            <div class="month-bar-label">${months[i]}</div>
          </div>
        `).join('')}
      </div>
    </div>
    ${yearBooks.length ? `
      <div>
        <h3 class="sub-heading">Finished This Year</h3>
        <div class="finished-grid">
          ${yearBooks.map(b => `
            <div class="finished-item">
              ${bookCoverHtml(b, 'small')}
              <div class="finished-content">
                <p class="finished-title">${escapeHtml(b.title)}</p>
                <p class="finished-date">${new Date(b.dateFinished).toLocaleDateString('en', { month: 'short', day: 'numeric' })}</p>
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

function setChallenge(val) {
  state.challenge.goal = parseInt(val) || 0;
  saveState();
  renderAll();
}

function editReaderName() {

// ============== EXPORT / IMPORT BACKUP ==============
function exportData() {
  const data = {
    version: 1,
    exportedAt: new Date().toISOString(),
    books: state.books,
    series: state.series,
    wishlist: state.wishlist,
    quotes: state.quotes,
    habits: state.habits,
    challenge: state.challenge,
    bookClubs: state.bookClubs,
    readerName: state.readerName,
  };
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const today = new Date().toISOString().split('T')[0];
  const namePart = state.readerName ? state.readerName.replace(/[^a-z0-9]/gi, '-').toLowerCase() + '-' : '';
  const a = document.createElement('a');
  a.href = url;
  a.download = `reading-room-${namePart}${today}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('Backup saved! Keep this file somewhere safe — you can use it to restore your library on any device.');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data || typeof data !== 'object') throw new Error('Invalid file');
        const counts = {
          books: (data.books || []).length,
          quotes: (data.quotes || []).length,
          series: (data.series || []).length,
          wishlist: (data.wishlist || []).length,
          habits: (data.habits || []).length,
          clubs: (data.bookClubs || []).length,
        };
        const summary = `This backup contains:\n\n` +
          `• ${counts.books} books\n` +
          `• ${counts.quotes} quotes\n` +
          `• ${counts.series} series\n` +
          `• ${counts.wishlist} wishlist items\n` +
          `• ${counts.habits} habits\n` +
          `• ${counts.clubs} book clubs\n\n` +
          `Loading will REPLACE your current library. Continue?`;
        if (!confirm(summary)) return;
        if (Array.isArray(data.books)) state.books = data.books;
        if (Array.isArray(data.series)) state.series = data.series;
        if (Array.isArray(data.wishlist)) state.wishlist = data.wishlist;
        if (Array.isArray(data.quotes)) state.quotes = data.quotes;
        if (Array.isArray(data.habits)) state.habits = data.habits;
        if (Array.isArray(data.bookClubs)) state.bookClubs = data.bookClubs;
        if (data.challenge && typeof data.challenge === 'object') state.challenge = data.challenge;
        if (typeof data.readerName === 'string') state.readerName = data.readerName;
        saveState();
        renderAll();
        alert('Library restored successfully.');
      } catch (err) {
        alert('Could not read this file. Make sure it\'s a Reading Room backup file (.json).');
        console.error(err);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ============== CALENDAR ==============
function renderCalendar() {
  const viewDate = state.calendarDate;
  const year = viewDate.getFullYear();
  const month = viewDate.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayDate = new Date().toDateString();

  const events = {};
  state.books.forEach(b => {
    if (b.dateFinished) {
      const k = new Date(b.dateFinished).toDateString();
      if (!events[k]) events[k] = [];
      events[k].push({ type: 'finished', label: `Finished ${b.title}` });
    }
    if (b.dateStarted) {
      const k = new Date(b.dateStarted).toDateString();
      if (!events[k]) events[k] = [];
      events[k].push({ type: 'started', label: `Started ${b.title}` });
    }
  });
  state.bookClubs.forEach(c => {
    (c.meetings || []).forEach(m => {
      if (m.date) {
        const k = new Date(m.date).toDateString();
        if (!events[k]) events[k] = [];
        events[k].push({ type: 'club', label: `${c.name}: ${m.book || 'Meeting'}` });
      }
    });
  });

  const days = [];
  for (let i = 0; i < firstDay; i++) days.push(null);
  for (let i = 1; i <= daysInMonth; i++) days.push(new Date(year, month, i));

  const monthName = viewDate.toLocaleDateString('en', { month: 'long', year: 'numeric' });
  const upcoming = Object.entries(events)
    .filter(([k]) => new Date(k) >= new Date(todayDate))
    .sort(([a], [b]) => new Date(a) - new Date(b))
    .slice(0, 5);

  return `
    <div class="section-header">
      <div>
        <h2 class="section-title">Calendar</h2>
        <p class="section-subtitle">Your reading year</p>
      </div>
    </div>
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="navCalendar(-1)">‹</button>
      <h3 class="cal-month">${monthName}</h3>
      <button class="cal-nav-btn" onclick="navCalendar(1)">›</button>
    </div>
    <div class="calendar-grid">
      ${['S','M','T','W','T','F','S'].map(d => `<div class="cal-header">${d}</div>`).join('')}
      ${days.map(d => {
        if (!d) return '<div class="cal-cell empty"></div>';
        const dayEvents = events[d.toDateString()] || [];
        const isToday = d.toDateString() === todayDate;
        return `
          <div class="cal-cell ${isToday ? 'today' : ''}">
            <div class="cal-day-num">${d.getDate()}</div>
            ${dayEvents.slice(0, 2).map(e => `
              <div class="cal-event ${e.type}" title="${escapeHtml(e.label)}">${escapeHtml(e.label.length > 12 ? e.label.slice(0, 10) + '…' : e.label)}</div>
            `).join('')}
            ${dayEvents.length > 2 ? `<div style="font-size:0.55rem;color:var(--steel);font-style:italic;">+${dayEvents.length - 2}</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
    ${upcoming.length ? `
      <div class="upcoming">
        <h3 class="sub-heading">Upcoming</h3>
        ${upcoming.map(([date, evs]) => `
          <div class="upcoming-day">
            <div class="upcoming-date">
              <p class="upcoming-date-day">${new Date(date).getDate()}</p>
              <p class="upcoming-date-month">${new Date(date).toLocaleDateString('en', { month: 'short' })}</p>
            </div>
            <div class="upcoming-content">
              ${evs.map(e => {
                const colors = { finished: '#2d7a5f', started: 'var(--steel)', club: 'var(--navy)' };
                return `<p class="upcoming-event" style="color:${colors[e.type]}">${escapeHtml(e.label)}</p>`;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;
}

function navCalendar(dir) {
  state.calendarDate = new Date(state.calendarDate.getFullYear(), state.calendarDate.getMonth() + dir);
  renderMain();
}

              <p class="meeting-day">${new Date(m.date).getDate()}</p>

            </div>
            <div class="meeting-content">
              ${m.book ? `<p class="meeting-book">${escapeHtml(m.book)}</p>` : ''}
              ${m.notes ? `<p class="meeting-notes">${escapeHtml(m.notes)}</p>` : ''}
            </div>
            <button class="icon-btn" onclick="removeMeeting('${c.id}','${m.id}')">🗑</button>

        <button class="btn-primary" onclick="addDiscussion('${c.id}')">Post</button>

          <div class="discussion-item">
            <p class="discussion-text">${escapeHtml(d.text)}</p>

            </div>
          </div>
        `).join('')}

    `;
  }
  return '';
}

function setClubTab(clubId, tab) {
  state.clubTabs[clubId] = tab;
  renderMain();
}

function deleteClub(id) {
  if (!confirm('Delete this club?')) return;
  state.bookClubs = state.bookClubs.filter(c => c.id !== id);
  saveState();
  renderAll();
}

function saveClub(data) {
  if (data.id) {
    state.bookClubs = state.bookClubs.map(c => c.id === data.id ? { ...c, ...data } : c);
  } else {
    state.bookClubs.push({ ...data, id: uid(), members: [], meetings: [], discussions: [] });
  }
  saveState();
  closeModal();
  renderAll();
}

function addMember(clubId) {
  const input = document.getElementById('member-input-' + clubId);
  if (!input || !input.value.trim()) return;
  state.bookClubs = state.bookClubs.map(c => c.id === clubId ? { ...c, members: [...(c.members||[]), { id: uid(), name: input.value.trim() }] } : c);
  saveState();
  renderAll();
}

function removeMember(clubId, memberId) {
  state.bookClubs = state.bookClubs.map(c => c.id === clubId ? { ...c, members: c.members.filter(m => m.id !== memberId) } : c);
  saveState();
  renderAll();
}

function addMeeting(clubId) {
  const date = document.getElementById('meeting-date-' + clubId)?.value;
  const book = document.getElementById('meeting-book-' + clubId)?.value;
  const notes = document.getElementById('meeting-notes-' + clubId)?.value;
  if (!date) return alert('Please select a date');
  state.bookClubs = state.bookClubs.map(c => c.id === clubId ? { ...c, meetings: [...(c.meetings||[]), { id: uid(), date, book, notes }] } : c);
  saveState();
  renderAll();
}

function removeMeeting(clubId, meetingId) {
  state.bookClubs = state.bookClubs.map(c => c.id === clubId ? { ...c, meetings: c.meetings.filter(m => m.id !== meetingId) } : c);
  saveState();
  renderAll();
}

function addDiscussion(clubId) {
  const input = document.getElementById('discussion-input-' + clubId);
  if (!input || !input.value.trim()) return;
  state.bookClubs = state.bookClubs.map(c => c.id === clubId ? { ...c, discussions: [...(c.discussions||[]), { id: uid(), text: input.value.trim(), date: new Date().toISOString() }] } : c);
  saveState();
  renderAll();
}

function removeDiscussion(clubId, discId) {
  state.bookClubs = state.bookClubs.map(c => c.id === clubId ? { ...c, discussions: c.discussions.filter(d => d.id !== discId) } : c);
  saveState();
  renderAll();
}

// ============== MODAL ==============
function openModal(type, id) {
  state.modal = { type, id };
  let title = '', content = '';
  
  if (type === 'book') {
    const book = id ? state.books.find(b => b.id === id) : null;
    title = book ? 'Edit Book' : 'Add a Book';
    content = bookForm(book);
  } else if (type === 'series') {
    const s = id ? state.series.find(x => x.id === id) : null;
    title = s ? 'Edit Series' : 'Add Series';
    content = seriesForm(s);
  } else if (type === 'wish') {
    const w = id ? state.wishlist.find(x => x.id === id) : null;
    title = w ? 'Edit Wish' : 'Add to Wishlist';
    content = wishForm(w);
  } else if (type === 'quote') {
    const q = id ? state.quotes.find(x => x.id === id) : null;
    title = q ? 'Edit Quote' : 'Save a Quote';
    content = quoteForm(q);
  } else if (type === 'habit') {
    const h = id ? state.habits.find(x => x.id === id) : null;
    title = h ? 'Edit Habit' : 'Add Habit';
    content = habitForm(h);
  } else if (type === 'club') {
    const c = id ? state.bookClubs.find(x => x.id === id) : null;
    title = c ? 'Edit Club' : 'New Book Club';
    content = clubForm(c);
  }
  
  document.getElementById('modal').innerHTML = `
    <div class="modal-header">
      <h3 class="modal-title">${title}</h3>
      <button class="icon-btn" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">${content}</div>
  `;
  document.getElementById('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  state.modal = null;
  document.getElementById('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target.id === 'modal-overlay') closeModal();
});

async function lookupISBN() {
  const isbnInput = document.getElementById('f-isbn-lookup');
  const hint = document.getElementById('isbn-hint');
  const btn = document.getElementById('isbn-btn');
  const raw = isbnInput.value.trim().replace(/[-\s]/g, '');
  
  if (!raw) {
    hint.textContent = 'Please enter an ISBN.';
    hint.className = 'isbn-hint error';
    return;
  }
  if (!/^\d{10}$|^\d{13}$/.test(raw)) {
    hint.textContent = 'ISBN should be 10 or 13 digits.';
    hint.className = 'isbn-hint error';
    return;
  }
  
  // Warn if running from file://
  if (window.location.protocol === 'file:') {
    hint.textContent = 'Note: running from a local file may block lookups. If this fails, host the file online or run a local server.';
    hint.className = 'isbn-hint loading';
  }
  
  btn.disabled = true;
  btn.textContent = 'Looking up...';
  if (window.location.protocol !== 'file:') {
    hint.textContent = 'Searching...';
    hint.className = 'isbn-hint loading';
  }
  
  // Try Google Books first, then fall back to Open Library
  let result = null;
  let lastError = null;
  
  try {
    result = await tryGoogleBooks(raw);
  } catch (err) {
    lastError = err;
    console.warn('Google Books failed:', err);
  }
  
  if (!result) {
    try {
      result = await tryOpenLibrary(raw);
    } catch (err) {
      lastError = err;
      console.warn('Open Library failed:', err);
    }
  }
  
  if (!result) {
    if (lastError && lastError.message === 'network') {
      hint.textContent = 'Could not reach the internet. If you opened this as a local file, try hosting it online or running a local server (see the Guide tab).';
    } else {
      hint.textContent = 'No book found for that ISBN in either Google Books or Open Library. You can fill in the details manually.';
    }
    hint.className = 'isbn-hint error';
    btn.disabled = false;
    btn.textContent = 'Look up';
    return;
  }
  
  // Auto-fill fields
  if (result.title) document.getElementById('f-title').value = result.title;
  if (result.author) document.getElementById('f-author').value = result.author;
  if (result.genre) document.getElementById('f-genre').value = result.genre;
  if (result.pages) document.getElementById('f-pages').value = result.pages;
  
  if (result.coverUrl) {
    document.getElementById('f-cover').value = result.coverUrl;
    document.getElementById('f-cover-img').src = result.coverUrl;
    document.getElementById('f-cover-preview').style.display = 'flex';
    document.getElementById('f-cover-preview').style.flexDirection = 'column';
    hint.textContent = `Found "${result.title}" from ${result.source} with cover. Review and save.`;
  } else {
    hint.textContent = `Found "${result.title}" from ${result.source} — no cover available, but other details were filled in.`;
  }
  hint.className = 'isbn-hint success';
  
  btn.disabled = false;
  btn.textContent = 'Look up';
}

async function tryGoogleBooks(isbn) {
  let res;
  try {
    res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
  } catch (e) {
    throw new Error('network');
  }
  if (!res.ok) return null;
  const data = await res.json();
  if (!data.items || data.items.length === 0) return null;
  
  const info = data.items[0].volumeInfo;
  let coverUrl = '';
  if (info.imageLinks) {
    coverUrl = info.imageLinks.thumbnail || info.imageLinks.smallThumbnail || '';
    if (coverUrl) {
      coverUrl = coverUrl.replace(/^http:/, 'https:').replace(/&zoom=\d+/, '&zoom=2');
    }
  }
  
  return {
    title: info.title || '',
    author: (info.authors && info.authors.length) ? info.authors.join(', ') : '',
    genre: (info.categories && info.categories.length) ? info.categories[0] : '',
    pages: info.pageCount || '',
    coverUrl,
    source: 'Google Books',
  };
}

async function tryOpenLibrary(isbn) {
  let res;
  try {
    res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
  } catch (e) {
    throw new Error('network');
  }
  if (!res.ok) return null;
  const data = await res.json();
  const key = `ISBN:${isbn}`;
  if (!data[key]) return null;
  const info = data[key];
  
  const author = (info.authors && info.authors.length) ? info.authors.map(a => a.name).join(', ') : '';
  const genre = (info.subjects && info.subjects.length) ? info.subjects[0].name : '';
  const coverUrl = (info.cover && (info.cover.large || info.cover.medium || info.cover.small)) || '';
  
  return {
    title: info.title || '',
    author,
    genre,
    pages: info.number_of_pages || '',
    coverUrl,
    source: 'Open Library',
  };
}
