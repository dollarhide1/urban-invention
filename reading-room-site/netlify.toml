# Netlify configuration for The Reading Room
# This is a static site — there is no build step.

[build]
  publish = "."
  command = ""

# Pretty URL: /app serves app.html (so you can link to yoursite.com/app)
[[redirects]]
  from = "/app"
  to = "/app.html"
  status = 200

# Sensible security + caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# The service worker must never be cached, or updates won't reach users
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Serve the manifest with the correct content type
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# Long-cache the icons (they rarely change)
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
